<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0A0A0A"/>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#C9A84C" stroke-width="2"/>
  <!-- Middle circle -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#C9A84C" stroke-width="1"/>
  <!-- Triangle -->
  <polygon points="50,14 82,70 18,70" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner triangle lines (dashed detail) -->
  <line x1="50" y1="14" x2="50" y2="70" stroke="#C9A84C" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="50" y1="42" x2="18" y2="70" stroke="#C9A84C" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="50" y1="42" x2="82" y2="70" stroke="#C9A84C" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Center dot -->
  <circle cx="50" cy="42" r="2.5" fill="#C9A84C"/>
  <!-- Top dot -->
  <circle cx="50" cy="14" r="2" fill="#C9A84C"/>
</svg>
