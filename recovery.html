<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Nova Senha - ORUS</title>
    <style>
        body { background:#000; color:#c9a84c; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .card { background:#111; padding:40px; border-radius:15px; border:1px solid #c9a84c; text-align:center; width:100%; max-width:350px; }
        input { width:100%; padding:15px; margin:20px 0; background:#000; border:1px solid #333; color:#fff; border-radius:8px; outline:none; }
        button { width:100%; padding:15px; background:#c9a84c; color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="letter-spacing:3px;">ORÚS</h2>
        <p style="color:#888; font-size:12px;">DEFINA SUA NOVA SENHA</p>
        <input type="password" id="newPass" placeholder="Nova senha (min 6 carac.)">
        <button onclick="updatePassword()">ATUALIZAR SENHA</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient('https://aeymzibnwafenvuoagum.supabase.co', 'SUA_ANON_KEY');
        async function updatePassword() {
            const pass = document.getElementById('newPass').value;
            if(pass.length < 6) return alert("Senha muito curta!");
            const { error } = await sb.auth.updateUser({ password: pass });
            if (error) alert("Erro: " + error.message);
            else { alert("Senha atualizada! Faça login agora."); window.location.href = "index.html"; }
        }
    </script>
</body>
</html>
