<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Nova Senha - ORUS</title>
    <style>
        body { background:#000; color:#c9a84c; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .card { background:#111; padding:30px; border-radius:12px; border:1px solid #c9a84c; text-align:center; width:350px; }
        input { width:100%; padding:12px; margin:20px 0; background:#222; border:1px solid #444; color:#fff; border-radius:8px; box-sizing:border-box; outline:none; }
        input:focus { border-color:#c9a84c; }
        button { width:100%; padding:12px; background:#c9a84c; color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="letter-spacing:2px;">ORÚS - NOVA SENHA</h2>
        <p style="color:#888; font-size:12px;">Digite sua nova senha de acesso abaixo:</p>
        <input type="password" id="newPass" placeholder="Mínimo 6 caracteres">
        <button onclick="updatePassword()" id="btnSave">SALVAR NOVA SENHA</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient('https://aeymzibnwafenvuoagum.supabase.co', 'SUA_ANON_KEY_AQUI');

        async function updatePassword() {
            const pass = document.getElementById('newPass').value;
            const btn = document.getElementById('btnSave');
            if(pass.length < 6) return alert("A senha deve ter no mínimo 6 caracteres.");

            btn.innerText = "SALVANDO..."; btn.disabled = true;

            const { error } = await sb.auth.updateUser({ password: pass });

            if (error) {
                alert("Erro ao atualizar: " + error.message);
                btn.innerText = "SALVAR NOVA SENHA"; btn.disabled = false;
            } else {
                alert("Senha alterada com sucesso! Agora você pode logar.");
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
