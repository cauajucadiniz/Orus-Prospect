<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORUS - CRM</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --black: #0A0A0A; --dark: #111; 
  --card: #181818; --border: #2A2A2A; --text: #F0EDE8; --text-muted: #8A8580;
  --blue: #3498DB; --orange: #E67E22; --green: #2ECC71; --red: #E74C3C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

.topbar { background: var(--dark); border-bottom: 1px solid var(--gold); padding: 0 16px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); letter-spacing: 3px; }
.user-badge { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--gold); overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
.user-badge img { width: 100%; height: 100%; object-fit: cover; }

.nav { display: flex; background: var(--dark); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.nav-btn { flex: 1; padding: 15px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.page { display: none; padding: 20px; padding-bottom: 100px; }
.page.active { display: block; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; transition: 0.3s; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; }

.inp { width: 100%; background: #1a1a1a; border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 12px; outline: none; }
.btn-gold { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }

.spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--gold); color: #000; padding: 12px 25px; border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 9999; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="authGuard" style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;">Carregando Orus...</div>

<div class="topbar">
  <div class="logo">ORUS</div>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="user-badge" id="userBadge" onclick="openProfile()">?</div>
    <button onclick="sb.auth.signOut()" class="nav-btn" style="border:1px solid #333; padding:5px 10px; border-radius:4px; font-size:9px;">SAIR</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard', this)">Painel</button>
  <button class="nav-btn" onclick="showPage('leads', this)">Leads</button>
  <button class="nav-btn" onclick="showPage('scraper', this)">OrusSearch</button>
  <button class="nav-btn" onclick="showPage('relatorio', this)">Relatório</button>
</nav>

<!-- PAINEL -->
<div class="page active" id="page-dashboard">
  <div style="margin-bottom: 20px;">
    <span style="font-size: 10px; color: var(--text-muted);">BOM TRABALHO,</span>
    <h1 id="userNameDisp" style="font-size: 24px;">...</h1>
  </div>

  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
    <div class="card" style="text-align:center; border-left: 4px solid var(--blue);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-novo">0</div><div style="font-size:9px; color:var(--blue);">NOVOS</div></div>
    <div class="card" style="text-align:center; border-left: 4px solid var(--orange);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-abordado">0</div><div style="font-size:9px; color:var(--orange);">ABORDADOS</div></div>
    <div class="card" style="text-align:center; border-left: 4px solid var(--gold);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-agendado">0</div><div style="font-size:9px; color:var(--gold);">AGENDADOS</div></div>
    <div class="card" style="text-align:center; border-left: 4px solid var(--green);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-fechado">0</div><div style="font-size:9px; color:var(--green);">FECHADOS</div></div>
  </div>

  <div class="card" style="margin-top:10px;">
    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:8px;">
      <span>META DIÁRIA (10 ABORDAGENS)</span>
      <span id="progText">0 / 10</span>
    </div>
    <div style="height:8px; background:#222; border-radius:4px; overflow:hidden;">
      <div id="progFill" style="height:100%; background:var(--gold); width:0%; transition:0.5s;"></div>
    </div>
  </div>

  <h2 class="section-title" style="margin-top:20px;">Atividade Recente</h2>
  <div id="recentLeads"></div>
</div>

<!-- ORUSSEARCH -->
<div class="page" id="page-scraper">
  <div style="background:rgba(201,168,76,0.1); border:1px solid var(--gold); padding:10px; border-radius:8px; margin-bottom:15px; font-size:11px; color:var(--gold); text-align:center;">
    ⚠️ AVISO: Limite diário de 25 resultados de busca por conta.
  </div>
  
  <div class="card">
    <label style="font-size:10px; color:var(--gold);">LOCALIZAÇÃO (CIDADE, BAIRRO OU ESTADO)</label>
    <input class="inp" id="srcLoc" placeholder="Ex: Aldeota, Fortaleza, CE">

    <label style="font-size:10px; color:var(--gold);">SERVIÇO DE BUSCA</label>
    <select class="inp" id="apiChoice">
      <option value="apify">Apify (Google Maps - Recomendado)</option>
      <option value="scrapedo">Scrape.do (Google Search - Alternativo)</option>
    </select>

    <label style="font-size:10px; color:var(--gold);">SEGMENTO</label>
    <select class="inp" id="srcSeg">
        <option value="">Selecione um segmento...</option>
        <option>Restaurantes e Alimentação</option>
        <option>Salões de Beleza e Estética</option>
        <option>Clínicas e Saúde</option>
        <option>Academias e Personal Trainer</option>
        <option>Imobiliárias e Corretores</option>
        <option>Advocacia e Jurídico</option>
        <option>Odontologia</option>
        <option value="outro">Outro (campo livre)</option>
    </select>
    <input class="inp" id="srcNicho" placeholder="Ou digite um nicho específico...">

    <label style="font-size:10px; color:var(--gold);">RESULTADOS</label>
    <select class="inp" id="srcLimit">
        <option value="5">5 leads</option>
        <option value="15">15 leads</option>
        <option value="25" selected>25 leads (Máximo)</option>
    </select>

    <button class="btn-gold" id="btnSearch" onclick="runSearch()">Buscar Prospectos</button>
  </div>
  <div id="scraperResults"></div>
</div>

<!-- LEADS -->
<div class="page" id="page-leads">
    <div id="leadsList"></div>
</div>

<!-- RELATORIO -->
<div class="page" id="page-relatorio">
    <h2 class="section-title">Funil Completo</h2>
    <div id="relatorioContent"></div>
    <button class="btn-gold" onclick="exportCSV()" style="margin-top:20px;">Exportar para Excel</button>
</div>

<!-- MODAL PERFIL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal" style="background:#111; padding:25px; border:1px solid var(--gold); border-radius:15px; width:100%; max-width:350px;">
    <h2 class="section-title">Meu Perfil</h2>
    <div style="background:#222; padding:10px; border-radius:8px; border-left:3px solid var(--gold); margin-bottom:15px;">
        <span style="font-size:9px; color:var(--text-muted);">E-MAIL LOGADO:</span>
        <div id="displayUserEmail" style="font-size:12px; font-weight:bold;">...</div>
    </div>
    <input class="inp" id="newName" placeholder="Nome de Exibição">
    <button class="btn-gold" onclick="saveProfile()" id="btnSaveProfile" style="font-size:10px;">SALVAR ALTERAÇÕES</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#555; margin-top:15px; cursor:pointer; font-size:10px;">CANCELAR</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://aeymzibnwafenvuoagum.supabase.co';
const SUPABASE_KEY = 'SUA_ANON_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_EMAILS = ['cauandiniz12@gmail.com', 'suelemdeoliveirapaiva7@gmail.com'];
let currentUser = null;
let lastResults = [];

// INICIALIZAÇÃO
sb.auth.onAuthStateChange((event, session) => {
  if (!session) window.location.href = 'index.html';
  currentUser = session.user;
  document.getElementById('authGuard').style.display = 'none';
  loadProfile();
  loadData();
});

// FUNÇÃO DE BUSCA (REVISADA)
async function runSearch() {
  const isAdmin = ADMIN_EMAILS.includes(currentUser.email.toLowerCase());
  const hoje = new Date().toISOString().split('T')[0];

  if (!isAdmin) {
    const { count } = await sb.from('logs_buscas').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('created_at', hoje);
    if (count >= 25) return showToast("🚫 Limite de 25 leads atingido!");
  }

  const btn = document.getElementById('btnSearch');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> BUSCANDO...';

  const payload = {
    apiChoice: document.getElementById('apiChoice').value,
    loc: document.getElementById('srcLoc').value,
    seg: document.getElementById('srcSeg').value || document.getElementById('srcNicho').value,
    limit: document.getElementById('srcLimit').value
  };

  try {
    const response = await fetch('/api/search', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
    const data = await response.json();

    if (data.type === 'direct') {
      processResults(data.results, isAdmin);
    } else {
      showToast("Robô Orus Iniciado...");
      pollApify(data.runId, isAdmin);
    }
  } catch (e) {
    showToast("Erro na conexão.");
    btn.disabled = false; btn.innerHTML = 'BUSCAR PROSPECTOS';
  }
}

async function pollApify(runId, isAdmin) {
  let finished = false;
  while(!finished) {
    await new Promise(r => setTimeout(r, 4000));
    const res = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=SEU_TOKEN_APIFY_AQUI`);
    const data = await res.json();
    if (data.data.status === 'SUCCEEDED') {
      finished = true;
      const itemsRes = await fetch(`https://api.apify.com/v2/datasets/${data.data.defaultDatasetId}/items?token=SEU_TOKEN_APIFY_AQUI`);
      const items = await itemsRes.json();
      processResults(items.map(i => ({ name: i.title || i.name, address: i.address || i.fullAddress, phone: i.phone || '' })), isAdmin);
    } else if (data.data.status === 'FAILED') {
      finished = true; showToast("Erro no Apify.");
    }
  }
  document.getElementById('btnSearch').disabled = false;
  document.getElementById('btnSearch').innerHTML = 'BUSCAR PROSPECTOS';
}

function processResults(results, isAdmin) {
  lastResults = results;
  if (!isAdmin) results.forEach(() => sb.from('logs_buscas').insert({ user_id: currentUser.id }).then());
  renderResults(results);
  showToast(`${results.length} Leads Carregados!`);
}

// RENDERIZAÇÃO E CRM
function renderResults(results) {
  const container = document.getElementById('scraperResults');
  container.innerHTML = `<button id="btnAllToCRM" class="btn-gold" style="background:#2ecc71; margin:10px 0;" onclick="addAllToCRM()">Adicionar Todos ao CRM</button>` + 
  results.map((item, idx) => `
    <div class="card">
      <div style="font-weight:600; color:var(--gold);">${item.name}</div>
      <div style="font-size:11px; color:var(--text-muted);">${item.address}</div>
      <button id="btn-add-${idx}" onclick="addToSingleCRM(${idx})" style="background:var(--gold); color:#000; border:none; padding:5px 10px; border-radius:4px; font-size:10px; font-weight:bold; margin-top:10px;">+ CRM</button>
    </div>
  `).join('');
}

async function addToSingleCRM(idx) {
  const lead = lastResults[idx];
  const btn = document.getElementById(`btn-add-${idx}`);
  btn.disabled = true; btn.innerHTML = "Salvando...";
  await sb.from('leads').insert({ user_id: currentUser.id, name: lead.name, phone: lead.phone, addr: lead.address, status: 'novo' });
  btn.style.background = "#2ecc71"; btn.innerHTML = "✓ SALVO";
  loadData();
}

async function loadData() {
  const { data } = await sb.from('leads').select('*').eq('user_id', currentUser.id).order('created_at', {ascending: false});
  if (!data) return;
  
  const stats = { novo: data.filter(l => l.status === 'novo').length, abordado: data.filter(l => l.status === 'abordado').length, agendado: data.filter(l => l.status === 'agendado').length, fechado: data.filter(l => l.status === 'fechado').length };
  
  document.getElementById('dash-novo').innerText = stats.novo;
  document.getElementById('dash-abordado').innerText = stats.abordado;
  document.getElementById('dash-agendado').innerText = stats.agendado;
  document.getElementById('dash-fechado').innerText = stats.fechado;

  // Meta 10
  const hoje = new Date().toISOString().split('T')[0];
  const hojeAbordados = data.filter(l => l.status === 'abordado' && l.created_at.startsWith(hoje)).length;
  document.getElementById('progText').innerText = `${hojeAbordados} / 10`;
  document.getElementById('progFill').style.width = Math.min((hojeAbordados / 10) * 100, 100) + '%';
  
  // Atividade Recente
  document.getElementById('recentLeads').innerHTML = data.slice(0, 3).map(l => `<div class="card" style="font-size:12px;"><b>${l.name}</b> - ${l.status.toUpperCase()}</div>`).join('');
}

// UTILITÁRIOS
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (id === 'leads') renderLeads();
}

function openProfile() { document.getElementById('profileModal').classList.add('open'); document.getElementById('displayUserEmail').innerText = currentUser.email; }
function closeModal() { document.getElementById('profileModal').classList.remove('open'); }
</script>
</body>
</html>
