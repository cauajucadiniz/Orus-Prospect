<div class="page active" id="page-dashboard">

    <h1 id="userNameDisp">Carregando...</h1>
  </div>

  <!-- Stats Grid Completo -->
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
    <div class="card" style="text-align:center; border-left:4px solid var(--blue);"><div style="font-size:24px; font-family:'Bebas Neue';" id="f-novo">0</div><div style="font-size:9px; color:var(--blue);">NOVOS</div></div>
    <div class="card" style="text-align:center; border-left:4px solid var(--orange);"><div style="font-size:24px; font-family:'Bebas Neue';" id="f-abordado">0</div><div style="font-size:9px; color:var(--orange);">ABORDADOS</div></div>
    <div class="card" style="text-align:center; border-left:4px solid var(--gold);"><div style="font-size:24px; font-family:'Bebas Neue';" id="f-agendado">0</div><div style="font-size:9px; color:var(--gold);">AGENDADOS</div></div>
    <div class="card" style="text-align:center; border-left:4px solid var(--green);"><div style="font-size:24px; font-family:'Bebas Neue';" id="f-fechado">0</div><div style="font-size:9px; color:var(--green);">FECHADOS</div></div>
  </div>

  <!-- Meta Diária -->
  <div class="card" style="margin-top:15px; border-color: var(--border-gold);">
    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:8px;">
        <span>META DIÁRIA DE ABORDAGENS</span>
        <span id="progText">0 / 10</span>
    </div>
    <div class="progress-bar" style="height:8px; background:#222; border-radius:4px; overflow:hidden;">
        <div id="progFill" style="height:100%; background:var(--gold); width:0%; transition:0.5s;"></div>
    </div>
  </div>

  <h2 class="section-title" style="margin-top:20px;">📊 Atividade Recente</h2>
  <div id="recentLeads"></div>
</div>

<!-- BUSCA COM AVISO DE LIMITE -->
<div class="page" id="page-scraper">
    <div style="background:rgba(201,168,76,0.1); border:1px solid var(--gold); padding:10px; border-radius:8px; margin-bottom:15px; font-size:11px; color:var(--gold); text-align:center;">
        ⚠️ AVISO: Limite diário de 25 resultados de busca por conta.
    </div>
    <!-- ... (Filtros iguais ao anterior) ... -->
    <div style="margin-top:10px;">
        <label style="font-size:10px; color:var(--text-muted);">API PRIORITÁRIA:</label>
        <select id="apiSelector" class="inp">
            <option value="apify">Apify (Google Maps - Detalhado)</option>
            <option value="scrapedo">Scrape.do (Google Search - Alternativo)</option>
        </select>
    </div>
    <button class="btn-gold" id="btnSearch" onclick="runSearch()">Buscar Prospectos</button>
</div>

<!-- ... (Restante do HTML igual) ... -->

<script>
// --- CONFIGURAÇÃO E BYPASS ---
const ADMIN_EMAILS = ['cauandiniz12@gmail.com', 'suelemdeoliveirapaiva7@gmail.com'];
const APIFY_TOKEN = 'SEU_TOKEN_APIFY';
const SCRAPEDO_TOKEN = 'SEU_TOKEN_SCRAPEDO';

async function runSearch() {
  const isAdmin = ADMIN_EMAILS.includes(currentUser.email);
  const hoje = new Date().toISOString().split('T')[0];

  // Bypass de Admin: Se for admin, pula a verificação de logs_buscas
  if (!isAdmin) {
      const { count } = await sb.from('logs_buscas').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('created_at', hoje);
      if (count >= 25) { alert('Limite diário de 25 atingido!'); return; }
  }

  const selectedApi = document.getElementById('apiSelector').value;
  const btn = document.getElementById('btnSearch');
  btn.disabled = true; btn.innerText = 'Buscando...';

  const loc = document.getElementById('srcLoc').value;
  const seg = document.getElementById('srcSeg').value || document.getElementById('srcNicho').value;
  const limit = document.getElementById('srcLimit').value;

  try {
      let results = [];
      if (selectedApi === 'apify') {
          // Chamada Apify (Substitua pela sua lógica de Actor)
          const response = await fetch(`https://api.apify.com/v2/acts/apify~google-maps-scraper/runs?token=${APIFY_TOKEN}`, {
              method: 'POST', body: JSON.stringify({ queries: [`${seg} em ${loc}`], maxQueries: 1, limitPerQuery: parseInt(limit) })
          });
          // Nota: Apify requer polling (esperar o resultado), use sua rota /api/scraper se preferir
      } else {
          // Chamada Scrape.do (Simples Google Search)
          const targetUrl = encodeURIComponent(`https://www.google.com/search?q=${seg}+em+${loc}`);
          const res = await fetch(`https://api.scrape.do?token=${SCRAPEDO_TOKEN}&url=${targetUrl}`);
          // Scrape.do retorna HTML bruto, você precisaria processar ou usar o modo "Google Search API" deles.
      }

      // Registro de log apenas para não-admins
      if (!isAdmin) await sb.from('logs_buscas').insert({ user_id: currentUser.id });
      
      showToast("Busca finalizada!");
  } catch (e) {
      alert("Erro na busca.");
  }
  btn.disabled = false; btn.innerText = 'Buscar Prospectos';
}

async function loadStats() {
  const { data } = await sb.from('leads').select('*').eq('user_id', currentUser.id);
  if (data) {
    // Atualiza Painel e Relatório com as mesmas cores
    const novo = data.filter(l => l.status === 'novo').length;
    const abordado = data.filter(l => l.status === 'abordado').length;
    const agendado = data.filter(l => l.status === 'agendado').length;
    const fechado = data.filter(l => l.status === 'fechado').length;
    const sem = data.filter(l => l.status === 'sem-resposta').length;

    document.querySelectorAll('#f-novo').forEach(el => el.innerText = novo);
    document.querySelectorAll('#f-abordado').forEach(el => el.innerText = abordado);
    document.querySelectorAll('#f-agendado').forEach(el => el.innerText = agendado);
    document.querySelectorAll('#f-fechado').forEach(el => el.innerText = fechado);
    document.querySelectorAll('#f-sem').forEach(el => el.innerText = sem);

    // Meta Diária de Abordagens (Abordados hoje)
    const hoje = new Date().toISOString().split('T')[0];
    const abordadosHoje = data.filter(l => l.status === 'abordado' && l.updated_at?.startsWith(hoje)).length;
    const pct = Math.min((abordadosHoje / 10) * 100, 100);
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progText').innerText = `${abordadosHoje} / 10`;
  }
}
</script>
