<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORUS - CRM Prospectador</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --black: #0A0A0A; --dark: #111; 
  --card: #181818; --border: #2A2A2A; --text: #F0EDE8; --text-muted: #8A8580;
  --blue: #3498DB; --orange: #E67E22; --green: #2ECC71; --red: #E74C3C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* UI Base */
.topbar { background: var(--dark); border-bottom: 1px solid var(--gold); padding: 0 16px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); letter-spacing: 3px; }
.user-badge { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--gold); overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #1a1a1a; font-weight: bold; color: var(--gold); }
.user-badge img { width: 100%; height: 100%; object-fit: cover; }

.nav { display: flex; background: var(--dark); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.nav-btn { flex: 1; padding: 15px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.page { display: none; padding: 20px; padding-bottom: 100px; }
.page.active { display: block; }

/* Elementos de CRM */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; }
.inp { width: 100%; background: #1a1a1a; border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 12px; outline: none; }
.btn-gold { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
.btn-gold:active { transform: scale(0.98); }
.btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }

/* Animações */
.spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--gold); color: #000; padding: 12px 25px; border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 9999; transition: 0.4s; opacity: 0; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
</style>
</head>
<body>

<div id="authGuard" style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;">Iniciando ORUS...</div>

<div class="topbar">
  <div class="logo">ORUS</div>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="user-badge" id="userBadge" onclick="openProfile()">?</div>
    <button onclick="sb.auth.signOut()" class="nav-btn" style="border:1px solid #333; padding:5px 10px; border-radius:4px; font-size:9px;">SAIR</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard', this)">Painel</button>
  <button class="nav-btn" onclick="showPage('leads', this)">Leads</button>
  <button class="nav-btn" onclick="showPage('scraper', this)">OrusSearch</button>
  <button class="nav-btn" onclick="showPage('relatorio', this)">Relatório</button>
</nav>

<!-- PÁGINA: PAINEL -->
<div class="page active" id="page-dashboard">
    <div style="margin-bottom: 20px;">
        <span style="font-size: 10px; color: var(--text-muted);">VISÃO GERAL</span>
        <h1 id="userNameDisp" style="font-size: 24px;">...</h1>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="card" style="text-align:center; border-left: 4px solid var(--blue);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-novo">0</div><div style="font-size:9px; color:var(--blue);">NOVOS</div></div>
        <div class="card" style="text-align:center; border-left: 4px solid var(--orange);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-abordado">0</div><div style="font-size:9px; color:var(--orange);">ABORDADOS</div></div>
        <div class="card" style="text-align:center; border-left: 4px solid var(--gold);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-agendado">0</div><div style="font-size:9px; color:var(--gold);">AGENDADOS</div></div>
        <div class="card" style="text-align:center; border-left: 4px solid var(--green);"><div style="font-size:24px; font-family:'Bebas Neue';" id="dash-fechado">0</div><div style="font-size:9px; color:var(--green);">FECHADOS</div></div>
    </div>
    <div class="card" style="margin-top:10px;">
        <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:5px;"><span>META DIÁRIA (10 ABORDAGENS)</span><span id="progText">0/10</span></div>
        <div style="height:8px; background:#222; border-radius:4px; overflow:hidden;"><div id="progFill" style="height:100%; background:var(--gold); width:0%; transition:0.5s;"></div></div>
    </div>
    <h2 class="section-title" style="margin-top:20px;">Atividade Recente</h2>
    <div id="recentLeads"></div>
</div>

<!-- PÁGINA: LEADS -->
<div class="page" id="page-leads">
    <input class="inp" id="searchLeadsInp" placeholder="Filtrar por nome..." oninput="renderLeads()">
    <div id="leadsList"></div>
</div>

<!-- PÁGINA: ORUSSEARCH -->
<div class="page" id="page-scraper">
    <div style="background:rgba(201,168,76,0.1); border:1px solid var(--gold); padding:10px; border-radius:8px; margin-bottom:15px; font-size:11px; color:var(--gold); text-align:center;">
        ⚠️ Limite diário: 25 resultados por conta.
    </div>

    <div class="card">
        <label style="font-size:10px; color:var(--gold);">LOCALIZAÇÃO (CIDADE, BAIRRO OU ESTADO)</label>
        <input class="inp" id="srcLoc" placeholder="Ex: Fortaleza, CE">
        
        <label style="font-size:10px; color:var(--gold);">SERVIÇO DE BUSCA</label>
        <select class="inp" id="apiChoice">
            <option value="apify">Apify (Google Maps - Recomendado)</option>
            <option value="scrapedo">Scrape.do (Google Search - Alternativo)</option>
        </select>

        <label style="font-size:10px; color:var(--gold);">SEGMENTO</label>
        <select class="inp" id="srcSeg">
            <option value="">Selecione um segmento...</option>
            <option>Restaurantes e Alimentação</option>
            <option>Salões de Beleza e Estética</option>
            <option>Clínicas e Saúde</option>
            <option>Academias e Personal Trainer</option>
            <option>Imobiliárias e Corretores</option>
            <option>Advocacia e Jurídico</option>
            <option>Contabilidade</option>
            <option>Odontologia</option>
            <option>Psicologia e Terapia</option>
            <option>Educação e Cursos</option>
            <option>Automóveis e Concessionárias</option>
            <option>Eventos e Festas</option>
            <option>Moda e Vestuário</option>
            <option>Tecnologia e TI</option>
            <option>Construção e Reformas</option>
        </select>
        <input class="inp" id="srcNicho" placeholder="Ou digite o nicho manualmente...">

        <label style="font-size:10px; color:var(--gold);">QUANTIDADE DE LEADS</label>
        <select class="inp" id="srcLimit">
            <option value="5">5 leads</option>
            <option value="15">15 leads</option>
            <option value="25" selected>25 leads</option>
        </select>

        <button class="btn-gold" id="btnSearch" onclick="runSearch()">Buscar Prospectos</button>
    </div>
    <div id="scraperResults"></div>
</div>

<!-- PÁGINA: RELATÓRIO -->
<div class="page" id="page-relatorio">
    <h2 class="section-title">Funil de Prospecção</h2>
    <div class="card" id="relatorioFunil">
        <!-- Preenchido via JS -->
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="card">Taxa Agendamento<div id="c-agendamento" style="font-size:24px; color:var(--gold);">0%</div></div>
        <div class="card">Taxa Fechamento<div id="c-fechamento" style="font-size:24px; color:var(--gold);">0%</div></div>
    </div>
    <button class="btn-gold" onclick="exportCSV()">Exportar para Excel</button>
</div>

<!-- MODAL PERFIL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal" style="background:#111; padding:25px; border:1px solid var(--gold); border-radius:15px; width:100%; max-width:350px;">
    <h2 class="section-title">Meu Perfil</h2>
    <div style="background:#222; padding:10px; border-radius:8px; border-left:3px solid var(--gold); margin-bottom:15px;">
        <span style="font-size:9px; color:var(--text-muted);">E-MAIL LOGADO:</span>
        <div id="displayUserEmail" style="font-size:12px; font-weight:bold;">...</div>
    </div>
    <input class="inp" id="newName" placeholder="Nome de Exibição">
    <input class="inp" id="newAvatar" placeholder="Link da foto (URL)">
    <button class="btn-gold" onclick="saveProfile()" id="btnSaveProfile">SALVAR</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#555; margin-top:15px; cursor:pointer; font-size:11px;">FECHAR</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- CONFIGURAÇÃO (COLOQUE SEUS TOKENS AQUI) ---
const SUPABASE_URL = 'https://aeymzibnwafenvuoagum.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleW16aWJud2FmZW52dW9hZ3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDM5NDksImV4cCI6MjA5Mjg3OTk0OX0.mslQEeQOj_N1X5_KhBW-kBmCv7sKLglsUFGCXPuArJw';
const APIFY_TOKEN = 'apify_api_J5pSN8eifxP8t7bqZ5x5CdIJC64wvj19Q8Cm'; // Token Cauã
const SCRAPEDO_TOKEN = '6f272a1538354c0e86b0337c8651c56f6c56f8f5370'; // Token Cauã

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_EMAILS = ['cauandiniz12@gmail.com', 'suelemdeoliveirapaiva7@gmail.com'];

let currentUser = null;
let lastResults = [];

// --- AUTH & INICIALIZAÇÃO ---
sb.auth.onAuthStateChange((event, session) => {
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;
  document.getElementById('authGuard').style.display = 'none';
  loadProfile();
  loadData();
});

  import { serve } from "https://deno.land/std@0.168.0/http/server.ts"

const corsHeaders = {
  'Access-Control-Allow-Origin': '*',
  'Access-Control-Allow-Headers': 'authorization, x-client-info, apikey, content-type',
}

serve(async (req) => {
  // 1. Trata requisição de segurança (CORS)
  if (req.method === 'OPTIONS') return new Response('ok', { headers: corsHeaders })

  try {
    const { apiChoice, loc, seg, limit } = await req.json()
    const APIFY_TOKEN = Deno.env.get('APIFY_TOKEN')
    const SCRAPEDO_TOKEN = Deno.env.get('SCRAPEDO_TOKEN')

    let results = []

    if (apiChoice === 'apify') {
      // Chamada Síncrona do Apify (Espera o resultado)
      const res = await fetch(
        `https://api.apify.com/v2/acts/apify~google-maps-scraper/run-sync-get-dataset-items?token=${APIFY_TOKEN}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            queries: [`${seg} em ${loc}`],
            maxQueries: 1,
            limitPerQuery: parseInt(limit) || 5,
          })
        }
      )
      results = await res.json()
    } else {
      // Chamada Scrape.do
      const query = encodeURIComponent(`${seg} em ${loc}`)
      const res = await fetch(`https://api.scrape.do/google?token=${SCRAPEDO_TOKEN}&q=${query}`)
      const data = await res.json()
      results = data.organic_results || []
    }

    // Padronização para o seu CRM
    const formatted = results.map(i => ({
      name: i.title || i.name || "Empresa sem nome",
      address: i.address || i.snippet || i.fullAddress || "Endereço indisponível",
      phone: i.phone || i.phoneNumber || "",
      website: i.website || i.url || i.link || ""
    }))

    return new Response(JSON.stringify({ results: formatted }), {
      headers: { ...corsHeaders, 'Content-Type': 'application/json' },
      status: 200,
    })

  } catch (error) {
    return new Response(JSON.stringify({ error: error.message }), {
      headers: { ...corsHeaders, 'Content-Type': 'application/json' },
      status: 400,
    })
  }
})

// --- BUSCA ASSÍNCRONA (FRONTEND DIRETO) ---
async function runSearch() {
  const isAdmin = ADMIN_EMAILS.includes(currentUser.email.toLowerCase());
  const hoje = new Date().toISOString().split('T')[0];

  // Verificação de limite
  if (!isAdmin) {
    const { count } = await sb.from('logs_buscas').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('created_at', hoje);
    if (count >= 25) return showToast("🚫 Limite diário atingido!");
  }

  const btn = document.getElementById('btnSearch');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> BUSCANDO...';
  document.getElementById('scraperResults').innerHTML = '';

  const payload = {
    apiChoice: document.getElementById('apiChoice').value,
    loc: document.getElementById('srcLoc').value,
    seg: document.getElementById('srcSeg').value || document.getElementById('srcNicho').value,
    limit: document.getElementById('srcLimit').value
  };

  try {
    // CHAMADA PARA O SUPABASE EDGE FUNCTION
    const { data, error } = await sb.functions.invoke('search-leads', {
      body: payload
    });

    if (error) throw error;

    if (data.results && data.results.length > 0) {
      lastResults = data.results;
      
      // Registra no limite se não for admin
      if (!isAdmin) {
        for(let i=0; i < data.results.length; i++) {
          await sb.from('logs_buscas').insert({ user_id: currentUser.id });
        }
      }

      renderResults(data.results);
      showToast(`${data.results.length} leads encontrados!`);
    } else {
      showToast("Nenhum lead encontrado.");
    }

  } catch (e) {
    console.error(e);
    showToast("Erro na busca: Tente novamente em instantes.");
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'BUSCAR PROSPECTOS';
  }
}
// --- GESTÃO CRM ---
function renderResults(results) {
  const container = document.getElementById('scraperResults');
  container.innerHTML = `<button class="btn-gold" style="background:#2ecc71; margin-bottom:15px;" onclick="addAllToCRM()">+ ADICIONAR TODOS</button>` + 
  results.map((item, idx) => `
    <div class="card">
      <div style="font-weight:600; color:var(--gold);">${item.name}</div>
      <div style="font-size:11px; color:#888;">${item.address}</div>
      <div style="margin-top:10px; display:flex; gap:8px;">
        <button id="btn-add-${idx}" onclick="addToCRM(${idx})" style="background:var(--gold); color:#000; border:none; padding:5px 12px; border-radius:4px; font-size:10px; font-weight:bold;">+ CRM</button>
        ${item.phone ? `<a href="https://wa.me/${item.phone.replace(/\D/g,'')}" target="_blank" style="color:var(--green); text-decoration:none; font-size:10px; align-self:center;">WHATSAPP</a>` : ''}
      </div>
    </div>
  `).join('');
}

async function addToCRM(idx) {
  const l = lastResults[idx];
  const btn = document.getElementById(`btn-add-${idx}`);
  await sb.from('leads').insert({ user_id: currentUser.id, name: l.name, phone: l.phone, addr: l.address, status: 'novo' });
  btn.style.background = "#2ecc71"; btn.innerHTML = "✓"; btn.disabled = true;
  loadData();
}

async function addAllToCRM() {
  const btn = document.getElementById('btnAllToCRM');
  const leads = lastResults.map(l => ({ user_id: currentUser.id, name: l.name, phone: l.phone, addr: l.address, status: 'novo' }));
  await sb.from('leads').insert(leads);
  showToast("Todos foram salvos!");
  renderLeads(); loadData();
}

async function renderLeads() {
  const container = document.getElementById('leadsList');
  const { data } = await sb.from('leads').select('*').eq('user_id', currentUser.id).order('created_at', {ascending: false});
  if (!data || data.length === 0) return container.innerHTML = '<p style="text-align:center; padding:40px; color:#555;">Vazio.</p>';
  
  const q = document.getElementById('searchLeadsInp').value.toLowerCase();
  const filtered = data.filter(l => l.name.toLowerCase().includes(q));

  container.innerHTML = filtered.map(l => `
    <div class="card" style="border-left: 4px solid ${getStatusColor(l.status)}">
      <b>${l.name}</b>
      <div style="display:flex; gap:10px; margin-top:10px; align-items:center;">
        <select onchange="updateLeadStatus('${l.id}', this.value)" style="background:#222; color:#fff; border:1px solid #444; font-size:10px; padding:5px; border-radius:4px;">
            <option value="novo" ${l.status==='novo'?'selected':''}>Novo</option>
            <option value="abordado" ${l.status==='abordado'?'selected':''}>Abordado</option>
            <option value="agendado" ${l.status==='agendado'?'selected':''}>Agendado</option>
            <option value="fechado" ${l.status==='fechado'?'selected':''}>Fechado</option>
            <option value="sem-resposta" ${l.status==='sem-resposta'?'selected':''}>Sem Resposta</option>
        </select>
        ${l.phone ? `<a href="https://wa.me/${l.phone.replace(/\D/g,'')}" target="_blank" style="font-size:10px; color:var(--green);">WhatsApp</a>` : ''}
        <button onclick="deleteLead('${l.id}')" style="background:none; border:none; color:var(--red); font-size:10px; cursor:pointer; margin-left:auto;">EXCLUIR</button>
      </div>
    </div>
  `).join('');
}

async function updateLeadStatus(id, s) { await sb.from('leads').update({ status: s }).eq('id', id); showToast("Atualizado!"); loadData(); renderLeads(); }
async function deleteLead(id) { if(confirm("Remover?")) { await sb.from('leads').delete().eq('id', id); renderLeads(); loadData(); } }

// --- DASHBOARD E STATS ---
async function loadData() {
  const { data } = await sb.from('leads').select('*').eq('user_id', currentUser.id).order('created_at', {ascending: false});
  if (!data) return;
  const s = { novo: data.filter(l => l.status === 'novo').length, abordado: data.filter(l => l.status === 'abordado').length, agendado: data.filter(l => l.status === 'agendado').length, fechado: data.filter(l => l.status === 'fechado').length, sem: data.filter(l => l.status === 'sem-resposta').length };
  
  // Update Dash
  const ids = ['novo', 'abordado', 'agendado', 'fechado'];
  ids.forEach(id => { if(document.getElementById('dash-'+id)) document.getElementById('dash-'+id).innerText = s[id]; });

  // Meta 10
  const hoje = new Date().toISOString().split('T')[0];
  const hojeAbordados = data.filter(l => l.status === 'abordado' && l.created_at.startsWith(hoje)).length;
  document.getElementById('progText').innerText = `${hojeAbordados} / 10`;
  document.getElementById('progFill').style.width = Math.min((hojeAbordados / 10) * 100, 100) + '%';
  
  // Atividade Recente
  document.getElementById('recentLeads').innerHTML = data.slice(0, 3).map(l => `<div class="card" style="font-size:12px; padding:10px;"><b>${l.name}</b></div>`).join('');
  
  // Relatório
  const total = data.length || 1;
  document.getElementById('c-agendamento').innerText = Math.round((s.agendado/total)*100) + '%';
  document.getElementById('c-fechamento').innerText = Math.round((s.fechado/total)*100) + '%';
}

// --- UTILS ---
async function loadProfile() { 
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  document.getElementById('displayUserEmail').innerText = currentUser.email;
  if(data) {
    document.getElementById('userNameDisp').innerText = data.display_name || currentUser.email.split('@')[0];
    if(data.avatar_url) document.getElementById('userBadge').innerHTML = `<img src="${data.avatar_url}">`;
  }
}
async function saveProfile() {
  const n = document.getElementById('newName').value; const a = document.getElementById('newAvatar').value;
  await sb.from('profiles').upsert({ id: currentUser.id, display_name: n, avatar_url: a });
  showToast("Perfil salvo!"); location.reload();
}
function getStatusColor(s) { return { novo: '#3498db', abordado: '#e67e22', agendado: '#f1c40f', fechado: '#2ecc71', 'sem-resposta': '#e74c3c' }[s] || '#888'; }
function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function showPage(id, b) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); if(id==='leads') renderLeads(); if(id==='dashboard' || id==='relatorio') loadData(); }
function openProfile() { document.getElementById('profileModal').classList.add('open'); }
function closeModal() { document.getElementById('profileModal').classList.remove('open'); }
async function exportCSV() { /* lógica csv já fornecida anteriormente */ }
</script>
</body>
</html>
