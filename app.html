<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORUS - CRM</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --black: #0A0A0A; --dark: #111; --card: #181818; --border: #2A2A2A; --text: #F0EDE8; --text-muted: #8A8580;
  --blue: #3498DB; --orange: #E67E22; --green: #2ECC71; --red: #E74C3C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; }
.topbar { background: var(--dark); border-bottom: 1px solid var(--gold); padding: 0 16px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); letter-spacing: 3px; }
.user-badge { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; background: #1a1a1a; font-size: 12px; font-weight: bold; overflow: hidden; }
.user-badge img { width: 100%; height: 100%; object-fit: cover; }
.nav { display: flex; background: var(--dark); border-bottom: 1px solid var(--border); overflow-x: auto; }
.nav-btn { flex: 1; padding: 15px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.page { display: none; padding: 20px; padding-bottom: 100px; }
.page.active { display: block; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); margin-bottom: 15px; }
.inp { width: 100%; background: #1a1a1a; border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 10px; outline: none; }
.btn-gold { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
.btn-gold:disabled { opacity: 0.5; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 9999; opacity: 0; transition: 0.3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
</style>
</head>
<body>

<div id="authGuard" style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;">Carregando Orus...</div>

<div class="topbar">
  <div class="logo">ORUS</div>
  <div style="display:flex; align-items:center; gap:10px;">
    <div class="user-badge" id="userBadge" onclick="openProfile()">?</div>
    <button onclick="sb.auth.signOut()" style="background:none; border:none; color:#555; font-size:10px; cursor:pointer;">SAIR</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard', this)">Painel</button>
  <button class="nav-btn" onclick="showPage('leads', this)">Leads</button>
  <button class="nav-btn" onclick="showPage('scraper', this)">OrusSearch</button>
  <button class="nav-btn" onclick="showPage('relatorio', this)">Relatório</button>
</nav>

<!-- PAINEL -->
<div class="page active" id="page-dashboard">
    <div style="margin-bottom: 20px;">
        <span style="font-size: 10px; color: var(--text-muted);">BOM TRABALHO,</span>
        <h1 id="userNameDisp" style="font-size: 24px;">...</h1>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="card" style="text-align:center; border-left: 3px solid var(--blue);"><div style="font-size:22px;" id="dash-novo">0</div><div style="font-size:9px; color:var(--blue);">NOVOS</div></div>
        <div class="card" style="text-align:center; border-left: 3px solid var(--orange);"><div style="font-size:22px;" id="dash-abordado">0</div><div style="font-size:9px; color:var(--orange);">ABORDADOS</div></div>
        <div class="card" style="text-align:center; border-left: 3px solid var(--gold);"><div style="font-size:22px;" id="dash-agendado">0</div><div style="font-size:9px; color:var(--gold);">AGENDADOS</div></div>
        <div class="card" style="text-align:center; border-left: 3px solid var(--green);"><div style="font-size:22px;" id="dash-fechado">0</div><div style="font-size:9px; color:var(--green);">FECHADOS</div></div>
    </div>
    <div class="card" style="margin-top:10px;">
        <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:5px;"><span>META DIÁRIA (10 ABORDAGENS)</span><span id="progText">0/10</span></div>
        <div style="height:6px; background:#222; border-radius:3px; overflow:hidden;"><div id="progFill" style="height:100%; background:var(--gold); width:0%;"></div></div>
    </div>
    <h2 class="section-title" style="margin-top:20px;">Atividade Recente</h2>
    <div id="recentLeads"></div>
</div>

<!-- ORUSSEARCH -->
<div class="page" id="page-scraper">
    <div style="background:rgba(201,168,76,0.1); border:1px solid var(--gold); padding:8px; border-radius:8px; margin-bottom:15px; font-size:10px; color:var(--gold); text-align:center;">⚠️ Limite diário: 25 resultados.</div>
    <div class="card">
        <label style="font-size:10px; color:var(--gold);">LOCALIZAÇÃO</label>
        <input class="inp" id="srcLoc" placeholder="Cidade ou Bairro">
        <label style="font-size:10px; color:var(--gold);">SERVIÇO</label>
        <select class="inp" id="apiChoice">
            <option value="apify">Apify (Google Maps)</option>
            <option value="scrapedo">Scrape.do (Google Search)</option>
        </select>
        <label style="font-size:10px; color:var(--gold);">SEGMENTO</label>
        <input class="inp" id="srcSeg" placeholder="Ex: Dentista">
        <label style="font-size:10px; color:var(--gold);">QUANTIDADE</label>
        <select class="inp" id="srcLimit">
            <option value="5">5 leads</option>
            <option value="15">15 leads</option>
            <option value="25">25 leads</option>
        </select>
        <button class="btn-gold" id="btnSearch" onclick="runSearch()">Buscar Prospectos</button>
    </div>
    <div id="scraperResults"></div>
</div>

<!-- LEADS -->
<div class="page" id="page-leads"><div id="leadsList"></div></div>

<!-- RELATORIO -->
<div class="page" id="page-relatorio">
    <h2 class="section-title">Relatório Geral</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="card">Taxa Agendamento<div id="c-agendamento" style="font-size:20px; color:var(--gold);">0%</div></div>
        <div class="card">Taxa Fechamento<div id="c-fechamento" style="font-size:20px; color:var(--gold);">0%</div></div>
    </div>
    <button class="btn-gold" onclick="exportCSV()">Exportar CSV</button>
</div>

<!-- MODAL PERFIL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal" style="background:#111; padding:20px; border:1px solid var(--gold); border-radius:12px; width:100%; max-width:320px;">
    <h2 class="section-title">Meu Perfil</h2>
    <p style="font-size:10px; color:#555; margin-bottom:10px;" id="displayUserEmail"></p>
    <input class="inp" id="newName" placeholder="Nome de Exibição">
    <input class="inp" id="newAvatar" placeholder="Link da foto (URL)">
    <button class="btn-gold" onclick="saveProfile()" style="font-size:11px;">SALVAR</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#444; margin-top:10px; cursor:pointer;">FECHAR</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://aeymzibnwafenvuoagum.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleW16aWJud2FmZW52dW9hZ3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDM5NDksImV4cCI6MjA5Mjg3OTk0OX0.mslQEeQOj_N1X5_KhBW-kBmCv7sKLglsUFGCXPuArJw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_EMAILS = ['cauandiniz12@gmail.com', 'suelemdeoliveirapaiva7@gmail.com'];
let currentUser = null;
let lastResults = [];

// --- INICIALIZAÇÃO ---
sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'index.html'; }
  else { 
    currentUser = data.session.user; 
    document.getElementById('authGuard').style.display = 'none';
    loadProfile(); loadData(); 
  }
});

// --- PERFIL ---
async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  document.getElementById('displayUserEmail').innerText = currentUser.email;
  if (data) {
    document.getElementById('userNameDisp').innerText = data.display_name || currentUser.email.split('@')[0];
    if (data.avatar_url) document.getElementById('userBadge').innerHTML = `<img src="${data.avatar_url}">`;
  }
}
async function saveProfile() {
  const name = document.getElementById('newName').value;
  const avatar = document.getElementById('newAvatar').value;
  await sb.from('profiles').upsert({ id: currentUser.id, display_name: name, avatar_url: avatar });
  showToast("Perfil salvo!"); location.reload();
}

// --- BUSCA ---
async function runSearch() {
  const isAdmin = ADMIN_EMAILS.includes(currentUser.email.toLowerCase());
  const hoje = new Date().toISOString().split('T')[0];
  if (!isAdmin) {
    const { count } = await sb.from('logs_buscas').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('created_at', hoje);
    if (count >= 25) return showToast("🚫 Limite diário atingido!");
  }

  const btn = document.getElementById('btnSearch');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> BUSCANDO...';
  
  const payload = { apiChoice: document.getElementById('apiChoice').value, loc: document.getElementById('srcLoc').value, seg: document.getElementById('srcSeg').value, limit: document.getElementById('srcLimit').value };

  try {
    const res = await fetch('/api/search', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.results) {
      lastResults = data.results;
      renderResults(data.results);
      if (!isAdmin) results.forEach(() => sb.from('logs_buscas').insert({ user_id: currentUser.id }).then());
      showToast(`${data.results.length} leads encontrados!`);
    }
  } catch (e) { showToast("Erro na conexão."); }
  btn.disabled = false; btn.innerHTML = "BUSCAR PROSPECTOS";
}

function renderResults(results) {
  const container = document.getElementById('scraperResults');
  container.innerHTML = `<button id="btnAllToCRM" class="btn-gold" style="background:#2ecc71; margin:10px 0;" onclick="addAllToCRM()">Adicionar Todos ao CRM</button>` + 
  results.map((item, idx) => `
    <div class="card">
      <div style="font-weight:600; color:var(--gold);">${item.name}</div>
      <div style="font-size:11px; color:#888;">${item.address}</div>
      <div style="margin-top:10px; display:flex; gap:8px;">
        <button id="btn-add-${idx}" onclick="addToSingleCRM(${idx})" style="background:var(--gold); color:#000; border:none; padding:5px 10px; border-radius:4px; font-size:10px; font-weight:bold;">+ CRM</button>
        ${item.phone ? `<a href="https://wa.me/${item.phone.replace(/\D/g,'')}" target="_blank" style="color:var(--green); font-size:10px; text-decoration:none; align-self:center;">WHATSAPP</a>` : ''}
      </div>
    </div>
  `).join('');
}

// --- CRM ---
async function addToSingleCRM(idx) {
  const l = lastResults[idx];
  const { error } = await sb.from('leads').insert({ user_id: currentUser.id, name: l.name, phone: l.phone, addr: l.address, status: 'novo' });
  if (!error) { showToast("Salvo!"); document.getElementById(`btn-add-${idx}`).style.background="#2ecc71"; document.getElementById(`btn-add-${idx}`).innerText="✓"; loadData(); }
}
async function addAllToCRM() {
  const leads = lastResults.map(l => ({ user_id: currentUser.id, name: l.name, phone: l.phone, addr: l.address, status: 'novo' }));
  await sb.from('leads').insert(leads);
  showToast("Todos salvos!"); renderLeads(); loadData();
}

async function renderLeads() {
  const container = document.getElementById('leadsList');
  const { data } = await sb.from('leads').select('*').eq('user_id', currentUser.id).order('created_at', {ascending: false});
  if (!data || data.length === 0) return container.innerHTML = '<p style="text-align:center; color:#555; padding:20px;">Vazio.</p>';
  container.innerHTML = data.map(l => `
    <div class="card" style="border-left: 3px solid ${getStatusColor(l.status)}">
      <b>${l.name}</b>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <select onchange="updateStatus('${l.id}', this.value)" style="background:#222; color:#fff; border:1px solid #444; font-size:10px;">
          <option value="novo" ${l.status==='novo'?'selected':''}>Novo</option>
          <option value="abordado" ${l.status==='abordado'?'selected':''}>Abordado</option>
          <option value="agendado" ${l.status==='agendado'?'selected':''}>Agendado</option>
          <option value="fechado" ${l.status==='fechado'?'selected':''}>Fechado</option>
        </select>
        <button onclick="deleteLead('${l.id}')" style="background:none; border:none; color:var(--red); font-size:10px;">Excluir</button>
      </div>
    </div>
  `).join('');
}
async function updateStatus(id, s) { await sb.from('leads').update({ status: s }).eq('id', id); showToast("Status OK"); loadData(); renderLeads(); }
async function deleteLead(id) { if(confirm("Excluir?")) { await sb.from('leads').delete().eq('id', id); renderLeads(); loadData(); } }

// --- DASHBOARD E STATS ---
async function loadData() {
  const { data } = await sb.from('leads').select('*').eq('user_id', currentUser.id);
  if (!data) return;
  const s = { novo: data.filter(l => l.status === 'novo').length, abordado: data.filter(l => l.status === 'abordado').length, agendado: data.filter(l => l.status === 'agendado').length, fechado: data.filter(l => l.status === 'fechado').length };
  document.getElementById('dash-novo').innerText = s.novo; document.getElementById('dash-abordado').innerText = s.abordado; document.getElementById('dash-agendado').innerText = s.agendado; document.getElementById('dash-fechado').innerText = s.fechado;
  const hoje = new Date().toISOString().split('T')[0];
  const hojeAbordados = data.filter(l => l.status === 'abordado' && l.created_at.startsWith(hoje)).length;
  document.getElementById('progText').innerText = `${hojeAbordados}/10`; document.getElementById('progFill').style.width = Math.min((hojeAbordados / 10) * 100, 100) + '%';
  document.getElementById('recentLeads').innerHTML = data.slice(0, 3).map(l => `<div class="card" style="font-size:12px;"><b>${l.name}</b></div>`).join('');
}

// --- UTILS ---
function getStatusColor(s) { return { novo: '#3498db', abordado: '#e67e22', agendado: '#f1c40f', fechado: '#2ecc71' }[s] || '#888'; }
function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function showPage(id, b) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); if(id==='leads') renderLeads(); }
function openProfile() { document.getElementById('profileModal').classList.add('open'); }
function closeModal() { document.getElementById('profileModal').classList.remove('open'); }
async function exportCSV() { /* lógica simplificada de csv */ }
</script>
</body>
</html>
