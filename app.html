<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORUS - CRM Prospectador</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* MANTENDO SEU CSS ORIGINAL */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#9A7A30;
  --black:#0A0A0A;--dark:#111111;--card:#181818;--card2:#1F1F1F;
  --border:#2A2A2A;--border-gold:rgba(201,168,76,0.3);
  --text:#F0EDE8;--text-muted:#8A8580;--text-gold:#C9A84C;
  --green:#2ECC71;--red:#E74C3C;--blue:#3498DB;--orange:#E67E22;
  --r:12px;--r-sm:8px;
}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

#authGuard{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:9999;}
.auth-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.topbar{background:var(--dark);border-bottom:1px solid var(--border-gold);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--gold);line-height:1}
.logo span{font-size:10px;letter-spacing:2px;color:var(--text-muted);display:block;font-family:'DM Sans',sans-serif;font-weight:300;margin-top:-2px}
.user-menu{display:flex;align-items:center;gap:10px}
.user-badge{width:34px;height:34px;border-radius:50%;background:rgba(201,168,76,0.1);border:1px solid var(--gold-dark);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);cursor:pointer;overflow:hidden;}
.logout-btn{padding:6px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border);color:var(--text-muted);background:transparent;cursor:pointer;transition:.15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.nav{display:flex;background:var(--dark);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:99;}
.nav-btn{flex:none;padding:12px 18px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.page{display:none;padding:16px;padding-bottom:80px}
.page.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
.inp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:.2s;margin-bottom:10px;}
.btn{width:100%;padding:14px;border-radius:var(--r-sm);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:none;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-gold{background:var(--gold);color:var(--black)}
.btn-outline{background:transparent;border:1px solid var(--border-gold);color:var(--gold)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:300;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex}
.modal{background:var(--dark);border-radius:var(--r);border:1px solid var(--border-gold);padding:24px;width:90%;max-width:400px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--black);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:.3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-10px)}
</style>
</head>
<body>

<div id="authGuard"><div class="auth-spinner"></div></div>

<div class="topbar">
  <div class="logo">ORUS<span>Prospectador</span></div>
  <div class="user-menu">
    <div class="user-badge" id="userBadge" title="Editar Perfil">?</div>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)">Painel</button>
  <button class="nav-btn" onclick="showPage('leads',this)">Leads</button>
  <button class="nav-btn" onclick="showPage('scraper',this)">OrusSearch</button>
  <button class="nav-btn" onclick="showPage('relatorio',this)">Relatório</button>
</nav>

<!-- PAGINAS -->
<div class="page active" id="page-dashboard">
    <div style="margin-bottom:16px">
        <div style="font-size:11px;color:var(--text-muted)">BOM TRABALHO,</div>
        <div style="font-size:20px;font-weight:600;color:var(--text)" id="welcomeName">...</div>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-label">Total Leads</div></div>
        <div class="stat-card"><div class="stat-num" id="st-agendado" style="color:var(--green)">0</div><div class="stat-label">Agendados</div></div>
    </div>
    <div class="section-title">Atividade Recente</div>
    <div id="recentLeads"></div>
</div>

<div class="page" id="page-leads">
    <input class="inp" id="searchInp" placeholder="Buscar leads..." oninput="renderLeads()">
    <div id="leadsList"></div>
</div>

<div class="page" id="page-scraper">
    <div class="section-title">OrusSearch (Limite: 15/dia)</div>
    <div class="card">
        <select class="inp" id="scraperCat">
            <option value="">Segmento...</option>
            <option>Clínica estética</option><option>Dentista</option><option>Academia</option><option>Restaurante</option>
        </select>
        <input class="inp" id="scraperCity" placeholder="Cidade">
        <select class="inp" id="scraperLimit">
            <option value="5">5 resultados</option>
            <option value="15">15 resultados</option>
        </select>
        <button class="btn btn-gold" id="scraperBtn" onclick="runScraper()">Buscar Leads</button>
    </div>
    <div id="scraperResults"></div>
</div>

<div class="page" id="page-relatorio">
    <div class="section-title">Relatório Geral</div>
    <div id="relatorioContent"></div>
    <button class="btn btn-outline" onclick="exportCSV()">Exportar CSV</button>
</div>

<!-- MODAL PERFIL -->
<div class="modal-overlay" id="profileModal">
    <div class="modal">
      <div class="modal-title" style="color:var(--gold); font-family:'Bebas Neue'; font-size:24px; margin-bottom:15px;">EDITAR PERFIL</div>
      <label style="font-size:11px; color:var(--text-muted)">NOME DE EXIBIÇÃO</label>
      <input class="inp" id="profileName" placeholder="Seu nome">
      <label style="font-size:11px; color:var(--text-muted)">URL DA FOTO (LINK)</label>
      <input class="inp" id="profileAvatar" placeholder="https://link-da-foto.com">
      <button class="btn btn-gold" onclick="saveProfile()">Salvar Perfil</button>
      <button class="btn btn-outline" style="margin-top:10px" onclick="document.getElementById('profileModal').classList.remove('open')">Cancelar</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://aeymzibnwafenvuoagum.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleW16aWJud2FmZW52dW9hZ3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDM5NDksImV4cCI6MjA5Mjg3OTk0OX0.mslQEeQOj_N1X5_KhBW-kBmCv7sKLglsUFGCXPuArJw';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let leads = [];

// INICIALIZAÇÃO E AUTH
sb.auth.getSession().then(({ data }) => {
  if(!data.session) { window.location.href = 'index.html'; return; }
  currentUser = data.session.user;
  
  // AQUI É O LUGAR CORRETO PARA CHAMAR O PERFIL
  updateProfileUI(); 

  document.getElementById('authGuard').style.display = 'none';
  loadLeads();
});

async function doLogout(){ await sb.auth.signOut(); window.location.href='index.html'; }

// PERFIL
document.getElementById('userBadge').onclick = () => document.getElementById('profileModal').classList.add('open');

async function updateProfileUI() {
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if (data) {
        if (data.avatar_url) document.getElementById('userBadge').innerHTML = `<img src="${data.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`;
        if (data.display_name) document.getElementById('welcomeName').innerText = data.display_name;
    } else {
        const email = currentUser.email || '';
        document.getElementById('userBadge').innerText = email.substring(0,2).toUpperCase();
        document.getElementById('welcomeName').innerText = email.split('@')[0];
    }
}

async function saveProfile() {
    const name = document.getElementById('profileName').value;
    const avatar = document.getElementById('profileAvatar').value;
    const { error } = await sb.from('profiles').upsert({ id: currentUser.id, display_name: name, avatar_url: avatar });
    if (!error) { showToast("Perfil salvo!"); setTimeout(() => location.reload(), 1000); }
}

// SCRAPER COM LIMITE DE PESQUISA E PRIORIDADE WHATSAPP
async function runScraper() {
  const hoje = new Date().toISOString().split('T')[0];
  try {
    const { count } = await sb.from('logs_buscas').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('created_at', hoje);
    if (count >= 15) { showToast('⚠️ Limite de 15 pesquisas diárias atingido!'); return; }
    await sb.from('logs_buscas').insert({ user_id: currentUser.id });
  } catch (err) { console.error(err); }

  const cat = document.getElementById('scraperCat').value;
  const city = document.getElementById('scraperCity').value.trim();
  if(!cat || !city) { showToast("Preencha os campos!"); return; }

  document.getElementById('scraperBtn').disabled = true;
  document.getElementById('scraperBtn').innerText = "Buscando...";

  try {
    const res = await fetch('/api/scraper', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cat, city, limit: 15 }) });
    const data = await res.json();
    
    // PRIORIZAR QUEM TEM TELEFONE
    const ordenados = data.results.sort((a,b) => (b.phone ? 1 : 0) - (a.phone ? 1 : 0));
    
    const container = document.getElementById('scraperResults');
    container.innerHTML = ordenados.map(item => `
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <div style="font-weight:600">${item.title || item.name}</div>
                <div style="font-size:12px; color:var(--text-muted)">${item.phone || 'Sem telefone'}</div>
            </div>
            ${item.phone ? '<span style="color:var(--green); font-size:10px; font-weight:bold;">WHATSAPP DISPONÍVEL</span>' : ''}
        </div>
    `).join('');
    
    showToast("Pesquisa concluída!");
  } catch (e) { showToast("Erro na API"); }
  document.getElementById('scraperBtn').disabled = false;
  document.getElementById('scraperBtn').innerText = "Buscar Leads";
}

// FUNÇÕES AUXILIARES (TOAST, PAGES, ETC)
function showToast(m){ const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function showPage(id,btn){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
async function loadLeads(){ /* sua função original de carregar leads */ }
function renderLeads(){ /* sua função original de renderizar leads */ }
</script>
</body>
</html>
