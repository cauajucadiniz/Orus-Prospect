<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORUS - Prospectador</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#9A7A30;
  --black:#0A0A0A;--dark:#111111;--card:#181818;--card2:#1F1F1F;
  --border:#2A2A2A;--border-gold:rgba(201,168,76,0.3);
  --text:#F0EDE8;--text-muted:#8A8580;
}
body{
  background:var(--black);color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.bg-pattern{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:radial-gradient(circle at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}
.container{
  width:100%;max-width:400px;position:relative;z-index:1;
}
.logo-area{text-align:center;margin-bottom:40px}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:52px;
  letter-spacing:8px;color:var(--gold);line-height:1;
}
.logo-sub{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:var(--text-muted);margin-top:4px;font-weight:300;
}
.logo-line{
  width:60px;height:1px;background:var(--border-gold);
  margin:16px auto;
}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:28px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.card-title{
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:24px;text-align:center;
}
.input-group{margin-bottom:16px}
.input-label{
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:8px;display:block;
}
.inp{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;color:var(--text);
  font-size:15px;font-family:'DM Sans',sans-serif;outline:none;
  transition:.2s;
}
.inp:focus{border-color:var(--gold-dark);background:var(--dark)}
.inp::placeholder{color:var(--text-muted);font-size:14px}
.btn{
  width:100%;padding:16px;border-radius:10px;
  font-size:12px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;font-family:'DM Sans',sans-serif;
  cursor:pointer;border:none;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:active{transform:scale(0.98)}
.btn-gold{background:var(--gold);color:var(--black)}
.btn-gold:hover{background:var(--gold-light)}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:11px;color:var(--text-muted);letter-spacing:1px}
.link-btn{
  width:100%;padding:14px;border-radius:10px;
  font-size:12px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;font-family:'DM Sans',sans-serif;
  cursor:pointer;background:transparent;
  border:1px solid var(--border-gold);color:var(--gold);
  transition:.15s;
}
.link-btn:hover{background:rgba(201,168,76,0.06)}
.link-btn:active{transform:scale(0.98)}
.msg{
  font-size:13px;text-align:center;padding:12px 16px;
  border-radius:8px;margin-bottom:16px;display:none;
}
.msg.error{background:rgba(231,76,60,0.1);color:#E74C3C;border:1px solid rgba(231,76,60,0.2)}
.msg.success{background:rgba(46,204,113,0.1);color:#2ECC71;border:1px solid rgba(46,204,113,0.2)}
.footer-text{
  text-align:center;margin-top:24px;
  font-size:11px;color:var(--text-muted);letter-spacing:0.5px;
}
.spinner{
  width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);
  border-top-color:var(--black);border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="container">
  <div class="logo-area">
    <div class="logo">ORUS</div>
    <div class="logo-line"></div>
    <div class="logo-sub">Prospectador Comercial</div>
  </div>

  <div class="card">
    <div class="card-title" id="formTitle">Acesso Restrito</div>

    <div class="msg" id="msg"></div>

    <div id="loginForm">
      <div class="input-group">
        <label class="input-label">Email</label>
        <input class="inp" type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label class="input-label">Senha</label>
        <input class="inp" type="password" id="loginPass" placeholder="Sua senha" autocomplete="current-password">
      </div>
      <button class="btn btn-gold" id="loginBtn" onclick="doLogin()">
        Entrar
      </button>
      <div style="margin-top: 20px; text-align: center;">
    <span style="color: #888; font-size: 0.9em;">Ainda não tem acesso?</span>
    <a href="/cadastro.html" style="color: #D4AF37; text-decoration: none; font-weight: bold; margin-left: 5px; display: inline-block;">Solicitar Cadastro</a>
</div>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">ou</div>
        <div class="divider-line"></div>
      </div>
      <button class="link-btn" onclick="showForgot()">Esqueci minha senha</button>
    </div>

    <div id="forgotForm" style="display:none">
      <div class="input-group">
        <label class="input-label">Email</label>
        <input class="inp" type="email" id="forgotEmail" placeholder="seu@email.com">
      </div>
      <button class="btn btn-gold" id="forgotBtn" onclick="doForgot()">
        Enviar link de recuperação
      </button>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">ou</div>
        <div class="divider-line"></div>
      </div>
      <button class="link-btn" onclick="showLogin()">Voltar ao login</button>
    </div>
  </div>

  <div class="footer-text">
    Acesso exclusivo para equipe Orus Company
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://aeymzibnwafenvuoagum.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleW16aWJud2FmZW52dW9hZ3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDM5NDksImV4cCI6MjA5Mjg3OTk0OX0.mslQEeQOj_N1X5_KhBW-kBmCv7sKLglsUFGCXPuArJw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  // Detecta se o usuário clicou no link de recuperação de senha
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === "PASSWORD_RECOVERY") {
    const novaSenha = prompt("Digite sua nova senha (mínimo 6 caracteres):");
    if (novaSenha && novaSenha.length >= 6) {
      const { error } = await sb.auth.updateUser({ password: novaSenha });
      if (error) alert("Erro ao atualizar: " + error.message);
      else alert("Senha atualizada com sucesso! Já pode logar.");
    }
  }
});

function showMsg(text, type){
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
function hideMsg(){ document.getElementById('msg').style.display = 'none'; }

function setLoading(btnId, loading){
  var btn = document.getElementById(btnId);
  if(loading){
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
  } else {
    btn.disabled = false;
  }
}

async function doLogin(){
  hideMsg();
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPass').value;
  if(!email || !pass){ showMsg('Preencha email e senha.', 'error'); return; }
  setLoading('loginBtn', true);
  var { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){
    setLoading('loginBtn', false);
    document.getElementById('loginBtn').innerHTML = 'Entrar';
    showMsg('Email ou senha incorretos.', 'error');
  } else {
    document.getElementById('loginBtn').innerHTML = 'Redirecionando...';
    window.location.href = 'app.html';
  }
}

async function doForgot(){
  var email = document.getElementById('forgotEmail').value.trim();
  if(!email) return showMsg('Digite seu email.', 'error');
  
  setLoading('forgotBtn', true);
  
  // CORREÇÃO AQUI: O link deve apontar para o recovery.html
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://orus-prospect.vercel.app/recovery.html',
  });

  setLoading('forgotBtn', false);
  if(error) showMsg('Erro ao enviar e-mail.', 'error');
  else showMsg('E-mail enviado! Verifique sua caixa de entrada.', 'success');
}

function showForgot(){
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('forgotForm').style.display = 'block';
  document.getElementById('formTitle').textContent = 'Recuperar Senha';
  hideMsg();
}
function showLogin(){
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('forgotForm').style.display = 'none';
  document.getElementById('formTitle').textContent = 'Acesso Restrito';
  hideMsg();
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    var ff = document.getElementById('forgotForm');
    if(ff.style.display === 'block') doForgot();
    else doLogin();
  }
});

sb.auth.getSession().then(function({ data }){
  if(data.session) window.location.href = 'app.html';
});
</script>
</body>
</html>
