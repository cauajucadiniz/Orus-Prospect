<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>ORUS - Acesso</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root { --gold: #C9A84C; --black: #0A0A0A; }
    body { background: var(--black); color: #fff; font-family: 'DM Sans', sans-serif; display: flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background: #111; padding: 40px; border-radius: 16px; border: 1px solid #222; width: 100%; max-width: 350px; text-align: center; }
    .logo { font-family: 'Bebas Neue'; font-size: 50px; color: var(--gold); letter-spacing: 5px; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
    .btn { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    .link { color: var(--gold); font-size: 12px; text-decoration: none; display: block; margin-top: 15px; cursor: pointer; }
</style>
</head>
<body>
    <div class="card">
        <div class="logo">ORUS</div>
        <div id="loginForm">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn" onclick="doLogin()">ENTRAR</button>
            <a class="link" href="cadastro.html">Solicitar Cadastro</a>
            <span class="link" onclick="showForgot()">Esqueci minha senha</span>
        </div>
        <div id="forgotForm" style="display:none">
            <input type="email" id="resetEmail" placeholder="Seu e-mail">
            <button class="btn" onclick="doForgot()">ENVIAR RECUPERAÇÃO</button>
            <span class="link" onclick="showLogin()">Voltar ao login</span>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://aeymzibnwafenvuoagum.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleW16aWJud2FmZW52dW9hZ3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDM5NDksImV4cCI6MjA5Mjg3OTk0OX0.mslQEeQOj_N1X5_KhBW-kBmCv7sKLglsUFGCXPuArJw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

sb.auth.onAuthStateChange((event, session) => {
  if (event === "PASSWORD_RECOVERY") { 
    window.location.href = "recovery.html"; 
  } else if (session && (event === "SIGNED_IN" || event === "INITIAL_SESSION")) {
    if (!window.location.hash.includes("recovery")) {
      window.location.href = "app.html";
    }
  }
});

async function doLogin(){
  const e = document.getElementById('email').value;
  const p = document.getElementById('pass').value;
  const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
  if(error) alert("Erro no login.");
}

async function doForgot(){
  const e = document.getElementById('resetEmail').value;
  await sb.auth.resetPasswordForEmail(e, { redirectTo: 'https://orus-prospect.vercel.app/recovery.html' });
  alert("Link enviado!");
}

function showForgot(){ document.getElementById('loginForm').style.display='none'; document.getElementById('forgotForm').style.display='block'; }
function showLogin(){ document.getElementById('loginForm').style.display='block'; document.getElementById('forgotForm').style.display='none'; }
</script>
</body>
</html>
